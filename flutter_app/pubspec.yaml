name: governess_app
description: Governess College full-stack client (Flutter + Riverpod + Dio).
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  # Portal stack
  flutter_riverpod: ^2.5.1
  dio: ^5.5.0
  flutter_secure_storage: ^9.2.2
  go_router: ^14.2.0
  # Marketing site stack
  google_fonts: ^6.2.1
  url_launcher: ^6.3.0
  http: ^1.5.0
  video_player: ^2.9.2
  image_picker: ^1.1.2
  cached_network_image: ^3.3.0
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
